:2.504988193511963,"y":-1.7422165870666504,"z":-2.8835296630859375,"url":"https://image.tmdb.org/t/p/w92/dTfL0YbTa7S59vZYmWbk6UofHkI.jpg","title":"The Haunting in Connecticut"},{"x":0.7060438394546509,"y":-1.5608694553375244,"z":-2.9980294704437256,"url":"https://image.tmdb.org/t/p/w92/mGsnNBk1WkXpCuwnweeLiKAHcb4.jpg","title":"Re-Animator"},{"x":0.8688766956329346,"y":-3.1776487827301025,"z":-1.5423662662506104,"url":"https://image.tmdb.org/t/p/w92/lemqKtcCuAano5aqrzxYiKC8kkn.jpg","title":"Gangs of New York"},{"x":1.6648445129394531,"y":-1.8475418090820312,"z":-3.192558765411377,"url":"https://image.tmdb.org/t/p/w92/f9ZAIUxTTk23vo1BC9Ur1Rx5c2E.jpg","title":"Hellraiser"},{"x":1.2713196277618408,"y":-0.5532035231590271,"z":-1.7463740110397339,"url":"https://image.tmdb.org/t/p/w92/cJeled7EyPdur6TnCA5GYg0UVna.jpg","title":"Carol"},{"x":3.5805370807647705,"y":-1.476040005683899,"z":-0.918638288974762,"url":"https://image.tmdb.org/t/p/w92/qxz3WIyjZiSKUhaTIEJ3c1GcC9z.jpg","title":"The Chronicles of Narnia: Prince Caspian"},{"x":1.4279118776321411,"y":-1.5406359434127808,"z":-2.959857702255249,"url":"https://image.tmdb.org/t/p/w92/sEcvc9h1X3hYZdFgtiiKMm6RB3f.jpg","title":"Suspiria"},{"x":-0.38917961716651917,"y":-1.5272412300109863,"z":-1.4985179901123047,"url":"https://image.tmdb.org/t/p/w92/mxsGXqetGnirf99qapYd5MMY1VL.jpg","title":"Twin Peaks: Fire Walk with Me"},{"x":1.8376193046569824,"y":-1.4660123586654663,"z":-1.6746439933776855,"url":"https://image.tmdb.org/t/p/w92/lTVOquzxw2DPF3MKuYd1ynz9F6H.jpg","title":"The Silence"},{"x":2.610098123550415,"y":-3.229511022567749,"z":-1.7958073616027832,"url":"https://image.tmdb.org/t/p/w92/5Y36lCiNyyV71mjq6LavgiggbhT.jpg","title":"My Name Is Khan"}];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0f1117");

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;

    // Auto-scale: center and normalize coords
    const xs = points.map(p => p.x), ys = points.map(p => p.y), zs = points.map(p => p.z);
    const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
    const cy = (Math.min(...ys) + Math.max(...ys)) / 2;
    const cz = (Math.min(...zs) + Math.max(...zs)) / 2;
    const span = Math.max(
      Math.max(...xs) - Math.min(...xs),
      Math.max(...ys) - Math.min(...ys),
      Math.max(...zs) - Math.min(...zs),
    );
    const scale = 40 / span;

    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    const sprites = [];
    let loaded = 0;
    const status = document.getElementById("status");

    points.forEach((p) => {
      loader.load(
        p.url,
        (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
          const sprite = new THREE.Sprite(material);
          sprite.position.set(
            (p.x - cx) * scale,
            (p.y - cy) * scale,
            (p.z - cz) * scale,
          );
          sprite.scale.set(0.9, 1.35, 1);
          sprite.userData = { title: p.title };
          scene.add(sprite);
          sprites.push(sprite);
          loaded += 1;
          if (loaded % 50 === 0 || loaded === points.length) {
            status.textContent = `loaded ${loaded} / ${points.length}`;
            if (loaded === points.length) setTimeout(() => (status.style.display = "none"), 1500);
          }
        },
        undefined,
        () => { loaded += 1; }  // count errors so the status terminates
      );
    });

    // Hover
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const tooltip = document.getElementById("tooltip");
    window.addEventListener("mousemove", (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(sprites);
      if (hits.length) {
        tooltip.textContent = hits[0].object.userData.title;
        tooltip.style.left = (e.clientX + 12) + "px";
        tooltip.style.top = (e.clientY + 12) + "px";
        tooltip.style.display = "block";
      } else {
        tooltip.style.display = "none";
      }
    });

    // Pause auto-rotate on user interaction
    controls.addEventListener("start", () => { controls.autoRotate = false; });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
